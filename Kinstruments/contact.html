  <body>

    <header>
      <a href="index.html" id="Kinstruments"><h1>Kinstruments</h1></a>
      <p id="pHeader">Instruments for Sale</p>

    <ul>
      <li id="home"><a href="index.html">Home</a></li>

      <li id="contact"><a href="contact.html">Contact Us</a></li>
    </ul>

    <div id="contactForm">
        <form name="formContact" action="https://httpbin.org/post​" onsubmit="return validateForm()" method="POST">
            <label for="name">Name: </label>
            <input type="text" name="name" placeholder="Name" required>
            <label for="email">Email Address: </label>
            <input type="email" name="email" placeholder="Email" required>
            <label for="address">Address: </label>
            <input type="text" name="address" placeholder="Address">
            <label for="city">City: </label>
            <input list="cities" name="city" placeholder="City" id="city" required>
            <datalist id="cities">
                <option value="Toronto"></option>
                <option value="Brampton"></option>
                <option value="Mississauga"></option>
                <option value="Richmond Hill"></option>
                <option value="Hamilton"></option>
                <option value="Vaughan"></option>
                <option value="Kitchener"></option>
                <option value="Windsor"></option>
            </datalist>

            <label for="postalCode">Postal Code: </label>
            <input type="text" name="postalCode" placeholder="Postal Code"
            pattern="[A-Za-z][0-9][A-Za-z]\s?[0-9][A-Za-z][0-9]" title="postalCode" required>

            <div id="radioButtons">
                <input type="radio" name="question" value="Question">
                <label for="question">Question</label>
                <input type="radio" name="comment" value="Comment">
                <label for="comment">Comment</label>
                <input type="radio" name="orderProblem" value="Order Problem">
                <label for="orderProblem">Order Problem</label>
            </div>

            <label for="message">Message: </label>
            <textarea id="message" name="message" rows="7" cols="100" placeholder="Enter message here"></textarea>

            <input type="hidden" id="myName" name="myName" value="Kristoffer Noel Dumasis">

            <input id="contactSubmit" type="submit" value="Submit">
        </form>


    </div>
